<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sound-a-tude</title>
    <meta name="description" content="A simple background audio loop player for mindset resets.">
    <meta name="theme-color" content="#111812">
    <link rel="canonical" href="https://acolomba.site/projects/soundatude/">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='32' fill='%23060607'/%3E%3Cpath d='M27 22v20l17-10z' fill='%23f2eee7'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Sound-a-tude player">
      <div class="page-rail" aria-label="Swipe pages">
        <section class="player app-page" id="sample" aria-label="Audio loop player">
          <div class="brand-header" aria-label="Sound-a-tude">
            <span class="brand-line" aria-hidden="true"></span>
            <span class="brand-mark" aria-hidden="true">
              <span></span>
              <span></span>
            </span>
            <p class="brand">Sound-a-tude</p>
            <span class="brand-line" aria-hidden="true"></span>
          </div>

        <div class="mode-toggle" role="group" aria-label="Playback type">
          <button class="is-selected" type="button" data-mode="loop" aria-pressed="true">Loop</button>
          <button type="button" data-mode="conversation" aria-pressed="false">Conversation</button>
        </div>

        <section class="now-console" aria-label="Now playing">
          <div class="console-meter" aria-hidden="true">
            <span style="--h: 34%"></span>
            <span style="--h: 68%"></span>
            <span style="--h: 42%"></span>
            <span style="--h: 86%"></span>
            <span style="--h: 52%"></span>
            <span style="--h: 74%"></span>
            <span style="--h: 38%"></span>
            <span style="--h: 92%"></span>
            <span style="--h: 57%"></span>
            <span style="--h: 45%"></span>
            <span style="--h: 79%"></span>
            <span style="--h: 50%"></span>
            <span style="--h: 64%"></span>
            <span style="--h: 36%"></span>
          </div>

          <div class="loop-picker" id="loopPicker">
            <button class="loop-trigger" id="loopTrigger" type="button" aria-expanded="false" aria-controls="loopWheel">
              <span class="wheel-caret up" aria-hidden="true"></span>
              <span class="loop-neighbor" id="previousLoop">Morning Mindset Reset</span>
              <span class="selected-loop" id="selectedLoop">Attitude &amp; Effort</span>
              <span class="loop-neighbor" id="nextLoop">Negative Thoughts to Positive Action</span>
              <span class="wheel-caret down" aria-hidden="true"></span>
            </button>

            <div class="loop-wheel" id="loopWheel" role="listbox" aria-label="Select loop" tabindex="-1">
              <button type="button" role="option" aria-selected="true" data-title="Attitude &amp; Effort">Attitude &amp; Effort</button>
              <button type="button" role="option" data-title="Negative Thoughts to Positive Action">Negative Thoughts to Positive Action</button>
              <button type="button" role="option" data-title="I Show Up Anyway">I Show Up Anyway</button>
              <button type="button" role="option" data-title="Mistakes Help Me Grow">Mistakes Help Me Grow</button>
              <button type="button" role="option" data-title="I Can Try Again">I Can Try Again</button>
              <button type="button" role="option" data-title="Focus and Discipline">Focus and Discipline</button>
              <button type="button" role="option" data-title="Confidence Before a Challenge">Confidence Before a Challenge</button>
              <button type="button" role="option" data-title="Big or Small, I Give My Best">Big or Small, I Give My Best</button>
              <button type="button" role="option" data-title="Calm Effort">Calm Effort</button>
              <button type="button" role="option" data-title="Morning Mindset Reset">Morning Mindset Reset</button>
            </div>
          </div>
        </section>

        <audio id="sampleAudio" src="assets/audio/attitude-effort-sample.mp3" preload="metadata" loop></audio>

        <label class="volume-control" for="volumeControl" aria-label="Volume">
          <span class="volume-icon low" aria-hidden="true"></span>
          <input id="volumeControl" type="range" min="0" max="100" value="35">
          <span class="volume-icon high" aria-hidden="true"></span>
        </label>

        <div class="transport-controls" aria-label="Playback options">
          <button class="queue-button" id="shuffleButton" type="button" aria-label="Shuffle loops" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h3c4.5 0 5.5 10 10 10h3"></path>
              <path d="M4 17h3c1.9 0 3.1-1.8 4.2-3.8"></path>
              <path d="M17 4l3 3-3 3"></path>
              <path d="M17 14l3 3-3 3"></path>
            </svg>
          </button>

          <button class="play-button" id="playButton" type="button" aria-label="Play">
            <span class="play-icon" aria-hidden="true"></span>
          </button>

          <button class="queue-button" id="loopAllButton" type="button" aria-label="Loop all loops" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4"></path>
              <path d="M3 11V9a3 3 0 0 1 3-3h15"></path>
              <path d="M7 22l-4-4 4-4"></path>
              <path d="M21 13v2a3 3 0 0 1-3 3H3"></path>
            </svg>
          </button>
          </div>
        </section>

        <section class="playlist-page app-page" aria-label="Playlist editor">
          <div class="brand-header compact" aria-label="Sound-a-tude playlist">
            <span class="brand-line" aria-hidden="true"></span>
            <p class="brand">Playlists</p>
            <span class="brand-line" aria-hidden="true"></span>
          </div>

          <div class="playlist-manager-head">
            <p id="playlistTitle">Starter mix</p>
            <span id="playlistCount">10 files</span>
          </div>

          <div class="playlist-tools" aria-label="Playlist controls">
            <div class="playlist-select-row">
              <select id="playlistSelect" aria-label="Choose playlist"></select>
              <button class="soft-action" id="createPlaylistButton" type="button" aria-label="Create playlist">
                <span aria-hidden="true">+</span>
              </button>
              <label class="load-files-button" for="fileLoader" aria-label="Load files">
                <input id="fileLoader" type="file" accept="audio/*" multiple>
                <span aria-hidden="true">Load</span>
              </label>
            </div>
          </div>

          <div class="playlist-editor" id="playlistEditor" aria-label="Available audio files"></div>
        </section>
      </div>

      <div class="page-dots" aria-hidden="true">
        <span></span>
        <span></span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
