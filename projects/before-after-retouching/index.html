<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Before/After Retouching | Antonio Colomba</title>
  <style>
    :root {
      --paper: #707070;
      --ink: #202833;
      --muted: #202833;
      --blue: #174e8f;
      --teal: #0f766e;
      --rule: rgba(32, 40, 51, 0.34);
      --night: #090b0d;
      --soft: #edf3f6;
      --warm: #efe6d5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.55;
    }

    main {
      width: min(100% - 36px, 980px);
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--rule);
      color: var(--muted);
      font-size: 15px;
    }

    nav strong {
      color: var(--ink);
      text-transform: uppercase;
    }

    a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    header {
      margin: 34px 0 24px;
    }

    h1 {
      max-width: 780px;
      margin: 0;
      color: var(--blue);
      font-size: clamp(34px, 5.6vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .experience-note {
      max-width: 900px;
      margin: 0 0 30px;
      font-size: clamp(17px, 1.7vw, 21px);
      font-weight: 700;
      line-height: 1.24;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px 26px;
    }

    .comparison {
      display: block;
      align-items: start;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--rule);
    }

    .number {
      color: var(--teal);
      margin-bottom: 12px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .comparison-view {
      max-width: none;
    }

    figure {
      margin: 0;
    }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-in;
      overflow: hidden;
    }

    .image-button:focus-visible {
      outline: 3px solid var(--teal);
      outline-offset: 4px;
    }

    .image-button img {
      display: block;
      width: 100%;
      height: auto;
    }

    .image-button video {
      display: block;
      width: 100%;
      aspect-ratio: var(--ai-aspect, 1040 / 884);
      height: auto;
      object-fit: contain;
      background: transparent;
    }

    .ai-placeholder {
      display: grid;
      width: 100%;
      aspect-ratio: 1.12 / 1;
      place-items: center;
      border: 1px solid var(--rule);
      background: var(--warm);
      color: var(--ink);
      text-align: center;
    }

    .view-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 24px;
      margin-top: 14px;
      text-align: center;
    }

    .view-control {
      background: transparent;
      border: 0;
      color: var(--blue);
      padding: 0;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-underline-offset: 4px;
    }

    .view-control[aria-pressed="true"],
    .view-control.is-active {
      color: var(--ink);
      text-decoration: underline;
    }

    .view-control:focus-visible {
      outline: 3px solid var(--teal);
      outline-offset: 5px;
    }

    .ai-placeholder-inner {
      width: min(100% - 38px, 260px);
    }

    .ai-kicker {
      display: block;
      color: var(--teal);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .ai-title {
      display: block;
      margin-top: 8px;
      color: var(--blue);
      font-size: clamp(20px, 2.3vw, 31px);
      font-weight: 700;
      line-height: 1.02;
      text-transform: uppercase;
    }

    .ai-note {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    figcaption {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      text-transform: uppercase;
    }

    .open-link {
      color: var(--blue);
      font-weight: 700;
      text-transform: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 18px;
      padding: 20px;
      background: rgba(5, 7, 9, 0.96);
      color: var(--soft);
    }

    .lightbox[aria-hidden="false"] {
      display: grid;
    }

    .lightbox-top,
    .lightbox-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .lightbox-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .close,
    .switch,
    .arrow {
      border: 1px solid rgba(237, 243, 246, 0.34);
      background: transparent;
      color: var(--soft);
      font: inherit;
      cursor: pointer;
    }

    .close,
    .arrow {
      min-width: 44px;
      min-height: 44px;
      padding: 9px 13px;
    }

    .switches {
      display: inline-flex;
      justify-content: center;
      gap: 22px;
    }

    .switch {
      min-width: 94px;
      min-height: 42px;
      border: 0;
      padding: 0;
      color: rgba(237, 243, 246, 0.72);
    }

    .switch[aria-pressed="true"],
    .switch.is-active {
      background: transparent;
      color: var(--soft);
      text-decoration: underline;
      text-underline-offset: 5px;
    }

    .switch:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    .lightbox-stage {
      display: grid;
      min-height: 0;
      place-items: center;
    }

    .lightbox-stage img,
    .lightbox-stage video {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .lightbox-count {
      margin: 0;
      color: rgba(237, 243, 246, 0.72);
      font-size: 15px;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 30px, 1120px);
      }

      nav {
        grid-template-columns: 1fr;
      }

      nav,
      .lightbox-top,
      .lightbox-controls {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        text-align: left;
      }

      .number {
        font-size: 24px;
      }

      .lightbox {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <nav>
      <strong>Antonio Colomba</strong>
      <span><a href="../../antonio-colomba-bio.html">Home</a> | <a href="../../operations-support-resume.html">Resume</a> | <a href="../../antonio-bio.html">Bio</a> | <a href="../../projects.html">Projects</a> | <a href="../../message.html">Message</a></span>
    </nav>

    <header>
      <h1>Before/After Retouching</h1>
    </header>

    <p class="experience-note">
      Antonio has worked with service bureaus, advertising agencies, and pharma agencies on production-ready print and web assets.
    </p>

    <section class="gallery" aria-label="Before, after, and AI retouching comparisons"></section>
  </main>

  <div class="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Image comparison viewer">
    <div class="lightbox-top">
      <p class="lightbox-title">Image 01</p>
      <button class="close" type="button" aria-label="Close viewer">x</button>
    </div>
    <div class="lightbox-stage">
    </div>
    <div class="lightbox-controls">
      <button class="arrow prev" type="button" aria-label="Previous image">&lt;</button>
      <div class="switches" aria-label="Choose image state">
        <button class="switch before-after-lightbox-toggle is-active" type="button" data-state="after">After</button>
        <button class="switch ai-lightbox-toggle" type="button" data-state="ai" aria-pressed="false" disabled>AI modified</button>
      </div>
      <p class="lightbox-count">1 / 10</p>
      <button class="arrow next" type="button" aria-label="Next image">&gt;</button>
    </div>
  </div>

  <script>
    const aiVideos = {
      "01": { src: "video/image-01-ai-kling-720p.mp4", width: 1040, height: 884 },
      "02": { src: "video/image-02-ai-kling-720p.mp4", width: 860, height: 1068 },
      "03": { src: "video/image-03-ai-kling-720p.mp4", width: 856, height: 1072 },
      "04": { src: "video/image-04-ai-kling-720p.mp4", width: 860, height: 1068 },
      "05": { src: "video/image-05-ai-kling-720p.mp4", width: 828, height: 1108 },
      "06": { src: "video/image-06-ai-kling-720p.mp4", width: 1040, height: 884 },
      "07": { src: "video/image-07-ai-kling-720p.mp4", width: 1040, height: 884 },
      "08": { src: "video/image-08-ai-kling-720p.mp4", width: 1024, height: 896 },
      "09": { src: "video/image-09-ai-kling-720p.mp4", width: 856, height: 1072 }
    };

    const items = Array.from({ length: 10 }, (_, index) => {
      const number = String(index + 1).padStart(2, "0");
      return {
        number,
        before: `images/image-${number}-before.webp`,
        after: `images/image-${number}-after.webp`,
        beforeThumb: `images/image-${number}-before-thumb.webp`,
        afterThumb: `images/image-${number}-after-thumb.webp`,
        ai: aiVideos[number] ? {
          type: "video",
          src: aiVideos[number].src,
          poster: `images/image-${number}-after-thumb.webp`,
          width: aiVideos[number].width,
          height: aiVideos[number].height
        } : number === "10" ? {
          type: "image",
          src: `upscaled/image-${number}-after-higgsfield-4k.webp`
        } : null
      };
    });

    const gallery = document.querySelector(".gallery");
    const lightbox = document.querySelector(".lightbox");
    const lightboxStage = lightbox.querySelector(".lightbox-stage");
    const lightboxTitle = lightbox.querySelector(".lightbox-title");
    const lightboxCount = lightbox.querySelector(".lightbox-count");
    const lightboxBeforeAfterToggle = lightbox.querySelector(".before-after-lightbox-toggle");
    const lightboxAiToggle = lightbox.querySelector(".ai-lightbox-toggle");
    let currentIndex = 0;
    let currentState = "before";
    let lightboxBeforeAfterState = "before";
    let lastFocused = null;

    function aiPlaceholderMarkup(number) {
      return `
        <div class="ai-placeholder" aria-label="AI modified placeholder for comparison ${number}">
          <span class="ai-placeholder-inner">
            <span class="ai-kicker">Queued</span>
            <span class="ai-title">AI Modified</span>
            <span class="ai-note">Higgsfield variant will land here.</span>
          </span>
        </div>
      `;
    }

    function imageButtonMarkup(item, index, state) {
      const label = state === "before" ? "Before" : "After";
      return `
        <button class="image-button" type="button" data-index="${index}" data-state="${state}" aria-label="Open image ${item.number} ${label.toLowerCase()}">
          <img src="${item[`${state}Thumb`]}" alt="${label} state for retouching comparison ${item.number}">
        </button>
      `;
    }

    function aiMediaMarkup(item) {
      if (!item.ai) {
        return aiPlaceholderMarkup(item.number);
      }
      if (item.ai.type === "video") {
        return `
          <button class="image-button" type="button" data-index="${Number(item.number) - 1}" data-state="ai" aria-label="Open image ${item.number} AI modified video">
            <video src="${item.ai.src}" poster="${item.ai.poster}" muted autoplay loop playsinline style="--ai-aspect: ${item.ai.width} / ${item.ai.height};"></video>
          </button>
        `;
      }
      return `
        <button class="image-button" type="button" data-index="${Number(item.number) - 1}" data-state="ai" aria-label="Open image ${item.number} AI modified">
          <img src="${item.ai.src}" alt="AI modified Higgsfield upscale for retouching comparison ${item.number}">
        </button>
      `;
    }

    function comparisonMarkup(item, index) {
      return `
        <article class="comparison">
          <div class="number">${item.number}</div>
          <div class="comparison-view" data-index="${index}" data-current-state="before">
            <figure>
              <div class="display-slot">${imageButtonMarkup(item, index, "before")}</div>
              <figcaption><span class="state-label">Before</span><span class="state-action open-link">Open</span></figcaption>
            </figure>
            <div class="view-controls" aria-label="Choose state for image ${item.number}">
              <button class="view-control before-after-toggle is-active" type="button" aria-label="Show after image ${item.number}">After</button>
              <button class="view-control ai-toggle" type="button" aria-pressed="false">AI modified</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderGallery() {
      gallery.innerHTML = items.map(comparisonMarkup).join("");
      gallery.querySelectorAll(".comparison-view").forEach((view) => {
        const index = Number(view.dataset.index);
        view.querySelector(".before-after-toggle").addEventListener("click", () => {
          const visibleBeforeAfterState = view.dataset.currentState === "ai" ? view.dataset.beforeAfterState || "before" : view.dataset.currentState;
          const nextState = visibleBeforeAfterState === "before" ? "after" : "before";
          updateComparisonView(view, index, nextState);
        });
        view.querySelector(".ai-toggle").addEventListener("click", () => {
          updateComparisonView(view, index, "ai");
        });
        bindDisplayButton(view);
      });
    }

    function bindDisplayButton(view) {
      const button = view.querySelector(".image-button");
      if (!button) {
        return;
      }
      button.addEventListener("click", () => {
        openLightbox(Number(button.dataset.index), button.dataset.state, button);
      });
    }

    function updateComparisonView(view, index, state) {
      const item = items[index];
      const slot = view.querySelector(".display-slot");
      const label = view.querySelector(".state-label");
      const action = view.querySelector(".state-action");
      const beforeAfterButton = view.querySelector(".before-after-toggle");
      const aiButton = view.querySelector(".ai-toggle");

      view.dataset.currentState = state;
      if (state === "before" || state === "after") {
        view.dataset.beforeAfterState = state;
      }
      const visibleBeforeAfterState = view.dataset.beforeAfterState || "before";
      const nextBeforeAfterState = visibleBeforeAfterState === "before" ? "after" : "before";
      beforeAfterButton.textContent = nextBeforeAfterState === "before" ? "Before" : "After";
      beforeAfterButton.setAttribute("aria-label", `Show ${nextBeforeAfterState} image ${item.number}`);
      beforeAfterButton.classList.toggle("is-active", state !== "ai");
      aiButton.setAttribute("aria-pressed", String(state === "ai"));

      if (state === "ai") {
        slot.innerHTML = aiMediaMarkup(item);
        label.textContent = item.ai ? "AI modified" : "AI modified queued";
        action.textContent = item.ai ? "Open" : "Pending";
      } else {
        slot.innerHTML = imageButtonMarkup(item, index, state);
        label.textContent = state === "before" ? "Before" : "After";
        action.textContent = "Open";
      }
      bindDisplayButton(view);
    }

    function updateLightbox() {
      const item = items[currentIndex];
      if (currentState === "ai" && !item.ai) {
        currentState = "before";
      }
      if (currentState === "before" || currentState === "after") {
        lightboxBeforeAfterState = currentState;
      }
      const nextBeforeAfterState = lightboxBeforeAfterState === "before" ? "after" : "before";
      if (currentState === "ai" && item.ai.type === "video") {
        lightboxStage.innerHTML = `<video src="${item.ai.src}" poster="${item.ai.poster}" controls autoplay loop playsinline></video>`;
      } else {
        const imageSource = currentState === "ai" ? item.ai.src : item[currentState];
        lightboxStage.innerHTML = `<img src="${imageSource}" alt="${currentState === "ai" ? "AI modified" : currentState} state for retouching comparison ${item.number}">`;
      }
      lightboxTitle.textContent = `Image ${item.number}`;
      lightboxCount.textContent = `${currentIndex + 1} / ${items.length}`;
      lightboxBeforeAfterToggle.textContent = nextBeforeAfterState === "before" ? "Before" : "After";
      lightboxBeforeAfterToggle.dataset.state = nextBeforeAfterState;
      lightboxBeforeAfterToggle.setAttribute("aria-label", `Show ${nextBeforeAfterState} image ${item.number}`);
      lightboxBeforeAfterToggle.classList.toggle("is-active", currentState !== "ai");
      lightboxAiToggle.disabled = !item.ai;
      lightboxAiToggle.setAttribute("aria-pressed", String(currentState === "ai"));
    }

    function openLightbox(index, state, trigger) {
      currentIndex = index;
      currentState = state;
      lastFocused = trigger;
      updateLightbox();
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      lightbox.querySelector(".close").focus();
    }

    function closeLightbox() {
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      if (lastFocused) {
        lastFocused.focus();
      }
    }

    function moveLightbox(direction) {
      currentIndex = (currentIndex + direction + items.length) % items.length;
      updateLightbox();
    }

    lightboxBeforeAfterToggle.addEventListener("click", () => {
      currentState = lightboxBeforeAfterState === "before" ? "after" : "before";
      updateLightbox();
    });

    lightboxAiToggle.addEventListener("click", () => {
      if (!items[currentIndex].ai) {
        return;
      }
      currentState = "ai";
      updateLightbox();
    });

    lightbox.querySelector(".close").addEventListener("click", closeLightbox);
    lightbox.querySelector(".prev").addEventListener("click", () => moveLightbox(-1));
    lightbox.querySelector(".next").addEventListener("click", () => moveLightbox(1));

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (lightbox.getAttribute("aria-hidden") === "true") {
        return;
      }
      if (event.key === "Escape") {
        closeLightbox();
      }
      if (event.key === "ArrowLeft") {
        moveLightbox(-1);
      }
      if (event.key === "ArrowRight") {
        moveLightbox(1);
      }
    });

    renderGallery();
    updateLightbox();
  </script>
</body>
</html>
